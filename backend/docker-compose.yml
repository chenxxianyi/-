version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: kr-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: knowledge_reader
      MYSQL_USER: reader
      MYSQL_PASSWORD: reader_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kr-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: kr-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kr-backend
    environment:
      ENV: development
      DEBUG: "true"
      SECRET_KEY: dev-secret-key-do-not-use-in-production
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: reader
      MYSQL_PASSWORD: reader_pass
      MYSQL_DATABASE: knowledge_reader
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: knowledge-reader
      MINIO_SECURE: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kr-celery-worker
    environment:
      ENV: development
      DEBUG: "true"
      SECRET_KEY: dev-secret-key-do-not-use-in-production
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: reader
      MYSQL_PASSWORD: reader_pass
      MYSQL_DATABASE: knowledge_reader
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: knowledge-reader
      MINIO_SECURE: "false"
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  mysql_data:
  minio_data:
